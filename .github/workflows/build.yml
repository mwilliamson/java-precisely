name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_to_github_packages:
        description: "Publish to GitHub Packages"
        required: true
        type: boolean

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ["25"]

    steps:

    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: "temurin"
        java-version: ${{ matrix.java-version }}

    - run: mvn package
